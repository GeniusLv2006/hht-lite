name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run check-release
      - run: npm audit --omit=dev
      - name: Verify generated version files
        run: |
          npm run sync-version
          git diff --exit-code

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: hht-lite:ci
          push: false
      - name: Smoke-test the container
        run: |
          docker run --detach --name hht-lite-ci hht-lite:ci
          trap 'docker rm --force hht-lite-ci' EXIT
          for attempt in {1..12}; do
            if [ "$(docker inspect hht-lite-ci --format '{{if .State.Health}}{{.State.Health.Status}}{{end}}')" = healthy ]; then
              docker exec hht-lite-ci wget --quiet --output-document=- http://127.0.0.1:3100/healthz
              exit 0
            fi
            sleep 5
          done
          docker logs hht-lite-ci
          exit 1
      - name: Validate Compose configuration
        run: |
          cp .env.example .env
          docker compose config --quiet

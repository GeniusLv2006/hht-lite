<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>慧湖通管理后台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ══════════════════════════════════════════
       CSS VARIABLES — Functional Brutalism
       (dark-mode class on body, set by JS)
    ══════════════════════════════════════════ */
    body {
      --bg:         #e8e4dd;
      --bg-2:       #dedad2;
      --ink:        #1a1a1a;
      --ink-2:      #6b6560;
      --accent:     #c23b22;
      --line:       rgba(26,26,26,0.82);
      --line-faint: rgba(26,26,26,0.11);
      --table-head-divider: rgba(26,26,26,0.16);
      --danger:     #b83225;
    }
    body.dark-mode {
      --bg:         #111110;
      --bg-2:       #1d1d1b;
      --ink:        #e8e4dd;
      --ink-2:      #7a7671;
      --accent:     #e05a3a;
      --line:       rgba(232,228,221,0.78);
      --line-faint: rgba(232,228,221,0.09);
      --table-head-divider: rgba(232,228,221,0.14);
      --danger:     #e05a3a;
    }

    /* ══ RESET ══ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Mono', 'SF Mono', monospace;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      transition: background 0.2s, color 0.2s;
    }

    /* ══ LOGIN ══ */
    .login-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .has-token .login-container { display: none !important; }
    .has-token .dashboard { display: block !important; }

    .login-box {
      width: 100%;
      max-width: 340px;
      border: 2px solid var(--line);
      padding: 36px 28px;
      box-shadow: 6px 6px 0 var(--line-faint);
      position: relative;
    }
    .login-box::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--accent);
    }
    .login-box h1 {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 28px;
    }

    /* ══ FORMS ══ */
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-size: 10px;
      font-weight: 500;
      color: var(--ink-2);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 11px 13px;
      background: var(--bg-2);
      border: 1.5px solid var(--line-faint);
      color: var(--ink);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
      border-radius: 0;
      -webkit-appearance: none;
      appearance: none;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: var(--accent); }
    .form-group input::placeholder,
    .form-group textarea::placeholder { color: var(--ink-2); }
    .readonly-input { opacity: 0.6; cursor: default; }

    .error-msg {
      color: var(--accent);
      font-size: 12px;
      margin-top: 12px;
      text-align: center;
      display: none;
    }

    /* ══ BUTTONS ══ */
    .btn {
      padding: 13px 18px;
      background: var(--ink);
      color: var(--bg);
      border: none;
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.12s, transform 0.1s;
      border-radius: 0;
      letter-spacing: 0.01em;
    }
    .btn:hover { opacity: 0.88; }
    .btn:active { transform: translateY(1px); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    .btn-danger {
      background: var(--danger);
      color: #fff;
    }
    .btn-outline {
      background: transparent;
      color: var(--ink);
      border: 1.5px solid var(--line);
    }
    .btn-outline:hover { background: var(--bg-2); }

    .btn-secondary {
      padding: 9px 14px;
      background: var(--bg-2);
      color: var(--ink);
      border: 1px solid var(--line-faint);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s;
      border-radius: 0;
      letter-spacing: 0.01em;
      white-space: nowrap;
    }
    .btn-secondary:hover { border-color: var(--line); background: var(--bg); }

    .btn-small {
      padding: 6px 11px;
      font-size: 11px;
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 500;
      cursor: pointer;
      border-radius: 0;
      border: 1px solid var(--line-faint);
      background: var(--bg-2);
      color: var(--ink);
      transition: border-color 0.12s;
    }
    .btn-small:hover { border-color: var(--line); }
    .btn-small.btn-outline { background: transparent; }

    /* Action buttons in table */
    .btn-tag, .btn-delete, .btn-unblock, .btn-block {
      padding: 4px 8px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      border-radius: 0;
      border: 1px solid var(--line-faint);
      background: transparent;
      color: var(--ink);
      margin-right: 4px;
      transition: border-color 0.12s, background 0.12s;
      white-space: nowrap;
    }
    .btn-tag:hover   { border-color: var(--ink-2); }
    .btn-delete:hover { border-color: var(--danger); color: var(--danger); }
    .btn-block:hover  { border-color: var(--danger); color: var(--danger); }
    .btn-unblock:hover { border-color: #2d7a4a; color: #2d7a4a; }

    /* ══ DASHBOARD ══ */
    .dashboard { display: none; }

    .header {
      background: var(--bg);
      border-bottom: 1px solid var(--line-faint);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      position: relative;
    }
    .header::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--accent);
    }
    .header h1 {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }
    .header-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-left: auto;
    }

    /* ══ CONTENT ══ */
    .content {
      padding: 20px 24px;
      max-width: 1440px;
      margin: 0 auto;
    }

    /* ══ STATS GRID ══ */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 1px;
      background: var(--line-faint);
      border: 1px solid var(--line-faint);
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--bg);
      padding: 18px 16px;
      transition: background 0.12s;
      cursor: default;
      position: relative;
    }
    .stat-card[onclick] { cursor: pointer; }
    .stat-card[onclick]:hover { background: var(--bg-2); }
    .stat-card .value {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 28px;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 6px;
    }
    .stat-card .value.danger { color: var(--danger); }
    .stat-card .label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      color: var(--ink-2);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* ══ CARD / TABLE ══ */
    .card {
      background: var(--bg);
      border: 1px solid var(--line-faint);
      margin-bottom: 20px;
      overflow: hidden;
    }
    .card-header {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line-faint);
    }
    .card-header h2 {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .filter-input, .filter-select {
      padding: 8px 10px;
      background: var(--bg-2);
      border: 1px solid var(--line-faint);
      color: var(--ink);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      outline: none;
      transition: border-color 0.12s;
      border-radius: 0;
      min-width: 0;
    }
    .filter-input:focus, .filter-select:focus { border-color: var(--accent); }
    .filter-btn {
      padding: 8px 14px;
      background: var(--ink);
      color: var(--bg);
      border: none;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border-radius: 0;
      transition: opacity 0.12s;
      white-space: nowrap;
    }
    .filter-btn:hover { opacity: 0.85; }
    .filter-btn.reset {
      background: transparent;
      color: var(--ink);
      border: 1px solid var(--line-faint);
    }
    .filter-btn.reset:hover { border-color: var(--line); background: var(--bg-2); }
    .note {
      font-size: 11px;
      color: var(--ink-2);
      margin-top: 10px;
      letter-spacing: 0.01em;
    }

    /* Table */
    .table-scroll-shell {
      --sticky-col-width: 140px;
      position: relative;
      isolation: isolate;
    }
    .table-scroll-shell::before,
    .table-scroll-shell::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 8px;
      width: 34px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.16s ease;
      z-index: 8;
    }
    .table-scroll-shell::before {
      left: var(--sticky-col-width);
      background: linear-gradient(90deg, var(--bg) 0%, rgba(232,228,221,0) 100%);
    }
    .table-scroll-shell::after {
      right: 0;
      background: linear-gradient(270deg, var(--bg) 0%, rgba(232,228,221,0) 100%);
    }
    body.dark-mode .table-scroll-shell::before {
      background: linear-gradient(90deg, var(--bg) 0%, rgba(17,17,16,0) 100%);
    }
    body.dark-mode .table-scroll-shell::after {
      background: linear-gradient(270deg, var(--bg) 0%, rgba(17,17,16,0) 100%);
    }
    .table-scroll-shell.is-scrollable:not(.is-scroll-start)::before { opacity: 1; }
    .table-scroll-shell.is-scrollable:not(.is-scroll-end)::after { opacity: 1; }

    .table-wrapper {
      overflow-x: auto;
      overflow-y: auto;
      max-height: min(68vh, 760px);
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      scrollbar-color: var(--line-faint) transparent;
    }
    .table-wrapper::-webkit-scrollbar { height: 8px; }
    .table-wrapper::-webkit-scrollbar-track { background: transparent; }
    .table-wrapper::-webkit-scrollbar-thumb {
      background: var(--line-faint);
      border-radius: 999px;
    }

    table {
      border-collapse: separate;
      border-spacing: 0;
      width: 100%;
      min-width: 1080px;
    }
    thead { border-bottom: 1px solid var(--table-head-divider); }
    th {
      position: sticky;
      top: 0;
      z-index: 4;
      padding: 12px 12px 11px;
      text-align: left;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      background: var(--bg);
      color: var(--ink-2);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      white-space: nowrap;
    }
    td {
      padding: 10px 12px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      border-bottom: 1px solid var(--line-faint);
      background: var(--bg);
      vertical-align: top;
    }
    tr:hover td { background: var(--bg-2); }

    .openid-cell {
      display: inline-block;
      font-size: 11px;
      white-space: nowrap;
      word-break: normal;
      min-width: max-content;
      color: var(--ink-2);
    }
    .openid-meta-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }
    .ip-cell { font-size: 11px; color: var(--ink-2); }
    .ip-geo {
      font-size: 10px;
      color: var(--ink-2);
      margin-top: 2px;
      opacity: 0.75;
    }
    .actions-cell { white-space: nowrap; }
    .table-time-col {
      min-width: 140px;
      position: sticky;
      left: 0;
      z-index: 3;
      box-shadow: 1px 0 0 var(--line-faint);
    }
    thead .table-time-col {
      z-index: 6;
    }
    .table-openid-col { min-width: 280px; }
    .table-action-col { min-width: 110px; }
    .table-device-col { min-width: 180px; }
    .table-ip-col { min-width: 220px; }
    .table-actions-col { min-width: 170px; }

    /* Action badges */
    .action-badge {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      padding: 3px 7px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .action-badge.manual  { background: rgba(194,59,34,0.12); color: var(--accent); }
    .action-badge.auto    { background: rgba(26,26,26,0.07); color: var(--ink-2); }
    .action-badge.timeout { background: rgba(184,50,37,0.15); color: var(--danger); }
    .action-badge.blocked { background: rgba(184,50,37,0.2); color: var(--danger); }
    .action-badge.success { background: rgba(45,122,74,0.12); color: #2d7a4a; }
    .action-badge.verify  { background: rgba(26,26,26,0.07); color: var(--ink-2); }
    .action-badge.load    { background: rgba(26,26,26,0.05); color: var(--ink-2); }
    .action-badge.refresh { background: rgba(26,26,26,0.05); color: var(--ink-2); }
    body.dark-mode .action-badge.auto,
    body.dark-mode .action-badge.load,
    body.dark-mode .action-badge.verify,
    body.dark-mode .action-badge.refresh { background: rgba(232,228,221,0.07); }

    /* Device badges */
    .device-info { display: flex; flex-direction: column; gap: 3px; }
    .device-main { display: flex; flex-wrap: wrap; gap: 3px; }
    .device-badge {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      padding: 2px 6px;
      background: var(--bg-2);
      border: 1px solid var(--line-faint);
      color: var(--ink-2);
      white-space: nowrap;
    }
    .device-badge.ios     { border-color: rgba(0,120,200,0.3); color: #0078c8; }
    .device-badge.android { border-color: rgba(60,160,80,0.3); color: #3ca050; }
    .device-badge.wechat  { border-color: rgba(7,193,96,0.3); color: #07c160; }
    .device-badge.mac     { border-color: rgba(100,100,100,0.3); }
    .device-badge.windows { border-color: rgba(0,120,215,0.3); color: #0078d7; }
    body.dark-mode .device-badge.ios     { color: #4db0f0; }
    body.dark-mode .device-badge.android { color: #6dd68a; }
    body.dark-mode .device-badge.wechat  { color: #4dd196; }
    body.dark-mode .device-badge.windows { color: #60a8f0; }
    .device-detail {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--ink-2);
    }

    /* User name subtitle */
    .user-name-sub {
      display: inline-flex;
      align-items: center;
      font-size: 11px;
      color: var(--ink-2);
      line-height: 1.2;
    }

    /* Tag badge */
    .tag-badge {
      display: inline-flex;
      align-items: center;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      padding: 2px 6px;
      background: rgba(194,59,34,0.1);
      color: var(--accent);
      border: 1px solid rgba(194,59,34,0.2);
      line-height: 1.2;
    }
    .blocked-badge {
      background: rgba(184,50,37,0.15);
      color: var(--danger);
      border-color: rgba(184,50,37,0.25);
    }

    /* ══ MOBILE LOG CARDS ══ */
    .log-cards { display: none; }
    .log-card {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line-faint);
    }
    .log-card:last-child { border-bottom: none; }
    .log-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .log-card-time {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--ink-2);
    }
    .log-card-openid {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--ink-2);
      white-space: nowrap;
      overflow-x: auto;
      overflow-y: hidden;
      margin-bottom: 6px;
    }
    .log-card-ip {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--ink-2);
      margin: 4px 0;
    }
    .log-card-ip .ip-geo {
      font-size: 10px;
      opacity: 0.75;
      margin-top: 1px;
    }
    .log-card-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
    }
    .log-card-actions { display: flex; gap: 4px; flex-wrap: wrap; }

    /* ══ PAGINATION ══ */
    .pagination-wrapper {
      padding: 14px 18px;
      border-top: 1px solid var(--line-faint);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
    }
    .pagination-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .pagination-nav button {
      padding: 6px 10px;
      background: transparent;
      border: 1px solid var(--line-faint);
      color: var(--ink);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      border-radius: 0;
      transition: border-color 0.12s, background 0.12s;
      min-width: 32px;
    }
    .pagination-nav button:hover:not(:disabled) { border-color: var(--line); background: var(--bg-2); }
    .pagination-nav button:disabled { opacity: 0.35; cursor: not-allowed; }
    .pagination-nav button.current {
      background: var(--ink);
      color: var(--bg);
      border-color: transparent;
    }
    .pagination-jump {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .pagination-size {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .pagination-jump label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--ink-2);
    }
    .pagination-jump input[type="number"] {
      width: 56px;
      padding: 6px 8px;
      background: var(--bg-2);
      border: 1px solid var(--line-faint);
      color: var(--ink);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      outline: none;
      border-radius: 0;
      -moz-appearance: textfield;
    }
    .pagination-jump input[type="number"]::-webkit-inner-spin-button,
    .pagination-jump input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
    .pagination-jump input:focus { border-color: var(--accent); }
    .pagination-jump button {
      padding: 6px 12px;
      background: var(--bg-2);
      border: 1px solid var(--line-faint);
      color: var(--ink);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      border-radius: 0;
      transition: border-color 0.12s;
    }
    .pagination-jump button:hover { border-color: var(--line); }
    .pagination-size select {
      min-width: 84px;
      padding: 6px 28px 6px 8px;
      background: var(--bg-2);
      border: 1px solid var(--line-faint);
      color: var(--ink);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      outline: none;
      border-radius: 0;
      appearance: none;
      -webkit-appearance: none;
      background-image:
        linear-gradient(45deg, transparent 50%, var(--ink-2) 50%),
        linear-gradient(135deg, var(--ink-2) 50%, transparent 50%);
      background-position:
        calc(100% - 15px) calc(50% - 2px),
        calc(100% - 10px) calc(50% - 2px);
      background-size: 5px 5px, 5px 5px;
      background-repeat: no-repeat;
    }
    .pagination-size select:focus { border-color: var(--accent); }
    .page-info {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--ink-2);
    }

    @media (max-width: 768px) {
      .content {
        padding: 16px 12px 20px;
      }
      .card-header {
        padding: 14px 12px;
      }
      table {
        min-width: 980px;
      }
      .table-wrapper {
        max-height: calc(100vh - 260px);
      }
      th {
        padding: 11px 10px 10px;
      }
      td {
        padding: 10px;
      }
      .pagination-wrapper {
        padding: 12px;
        flex-direction: column;
        align-items: stretch;
      }
      .pagination-jump {
        justify-content: space-between;
      }
    }

    /* ══ LIST ITEMS (users/blacklist modals) ══ */
    .list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--line-faint);
      gap: 12px;
    }
    .list-item:last-child { border-bottom: none; }
    .list-item-info { min-width: 0; flex: 1; }
    .list-item-title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      word-break: break-all;
      margin-bottom: 2px;
    }
    .list-item-subtitle {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--ink-2);
    }
    .empty-state {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--ink-2);
      padding: 20px 0;
      text-align: center;
    }

    /* ══ MODALS ══ */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26,26,26,0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-backdrop-filter: blur(4px);
      backdrop-filter: blur(4px);
    }
    body.dark-mode .modal { background: rgba(0,0,0,0.75); }
    .modal-content {
      background: var(--bg);
      border: 2px solid var(--line);
      padding: 26px 24px;
      max-width: 420px;
      width: calc(100vw - 48px);
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 6px 6px 0 var(--line-faint);
      position: relative;
    }
    .modal-content::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent);
    }
    .modal-content h2 {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 20px;
    }
    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    /* Notification status */
    #notifAdminStatus {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--ink-2);
      margin-bottom: 16px;
      margin-top: -12px;
    }

    /* ══ SCROLLBAR ══ */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg-2); }
    ::-webkit-scrollbar-thumb { background: var(--line-faint); }
    ::-webkit-scrollbar-thumb:hover { background: var(--ink-2); }
  </style>
</head>
<body>
  <div class="login-container" id="loginPage">
    <div class="login-box">
      <h1>管理后台</h1>
      <form id="loginForm">
        <div class="form-group">
          <label>用户名</label>
          <input type="text" id="username" required autocomplete="username">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn" style="width:100%">登录</button>
        <div class="error-msg" id="loginError"></div>
      </form>
    </div>
  </div>

  <div class="dashboard" id="dashboard">
    <div class="header">
      <h1>慧湖通管理后台</h1>
      <div class="header-actions">
        <button class="btn-secondary" id="darkModeToggle" onclick="toggleDarkMode()">🌙 深色</button>
        <button class="btn-secondary" onclick="refreshData()">刷新</button>
        <button class="btn-secondary" onclick="showNotificationModal()">通知</button>
        <button class="btn-secondary" onclick="showBlacklistModal()">黑名单</button>
        <button class="btn-secondary" onclick="showClearLogsModal()">清理</button>
        <button class="btn-secondary" onclick="showChangePasswordModal()">密码</button>
        <button class="btn-secondary" onclick="logout()">退出</button>
      </div>
    </div>

    <div class="content">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="value" id="statTotal">-</div>
          <div class="label">总访问</div>
        </div>
        <div class="stat-card" style="cursor:pointer;" onclick="showUsersModal()">
          <div class="value" id="statUnique">-</div>
          <div class="label">用户数 ↗</div>
        </div>
        <div class="stat-card">
          <div class="value" id="statToday">-</div>
          <div class="label">今日</div>
        </div>
        <div class="stat-card" style="cursor:pointer;" onclick="showBlacklistModal()">
          <div class="value danger" id="statBlocked">-</div>
          <div class="label">已拉黑 ↗</div>
        </div>
        <div class="stat-card">
          <div class="value" id="statRetention">-</div>
          <div class="label">保留</div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2>访问记录</h2>
          <div class="filters">
            <input type="text" class="filter-input" placeholder="OpenID" id="filterOpenId" style="flex:2;min-width:120px;">
            <select class="filter-select" id="filterAction">
              <option value="">全部操作</option>
              <option value="page_load">页面加载</option>
              <option value="qr_manual">手动刷新</option>
              <option value="qr_auto">自动刷新</option>
              <option value="qr_timeout">生成超时</option>
              <option value="qr_blocked">已被拉黑</option>
              <option value="admin_verify">管理员验证</option>
            </select>
            <select class="filter-select" id="filterDevice">
              <option value="">全部设备</option>
              <option value="iphone">iPhone</option>
              <option value="ipad">iPad</option>
              <option value="android">Android</option>
              <option value="mac">Mac</option>
              <option value="windows">Windows</option>
              <option value="wechat">微信</option>
            </select>
            <input type="date" class="filter-input" id="filterStartDate">
            <input type="date" class="filter-input" id="filterEndDate">
            <button class="filter-btn" onclick="applyFilters()">筛选</button>
            <button class="filter-btn reset" onclick="resetFilters()">重置</button>
          </div>
          <div class="note">* 设备版本号可能因浏览器隐私保护机制而显示不准确（Chrome 会冻结版本号）</div>
        </div>

        <!-- 桌面端表格 -->
        <div class="table-scroll-shell is-scroll-start is-scroll-end" id="logsTableShell">
          <div class="table-wrapper" id="logsTableWrapper">
            <table>
              <thead>
                <tr>
                  <th class="table-time-col">时间</th>
                  <th class="table-openid-col">OpenID</th>
                  <th class="table-action-col">操作</th>
                  <th class="table-device-col">设备</th>
                  <th class="table-ip-col">IP</th>
                  <th class="table-actions-col">管理</th>
                </tr>
              </thead>
              <tbody id="logsTable"></tbody>
            </table>
          </div>
        </div>

        <!-- 移动端卡片 -->
        <div class="log-cards" id="logCards"></div>

        <!-- 分页区域 -->
        <div class="pagination-wrapper">
          <div class="pagination-nav" id="paginationNav"></div>
          <div class="pagination-jump">
            <div class="pagination-size">
              <label for="pageSizeSelect">每页</label>
              <select id="pageSizeSelect">
                <option value="10">10 条</option>
                <option value="20" selected>20 条</option>
                <option value="50">50 条</option>
                <option value="100">100 条</option>
              </select>
            </div>
            <div style="display:flex;align-items:center;gap:6px;">
              <label>跳至</label>
              <input type="number" id="jumpPageInput" min="1" value="1">
              <label>页</label>
              <button onclick="jumpToPage()">跳转</button>
            </div>
            <span class="page-info" id="pageInfo">第 1 页，共 1 页，共 0 条记录</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Change Password Modal -->
  <div class="modal" id="changePasswordModal">
    <div class="modal-content">
      <h2>修改密码</h2>
      <form id="changePasswordForm">
        <div class="form-group">
          <label>当前密码</label>
          <input type="password" id="oldPassword" required>
        </div>
        <div class="form-group">
          <label>新密码</label>
          <input type="password" id="newPassword" required minlength="8">
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-outline" onclick="hideModal('changePasswordModal')">取消</button>
          <button type="submit" class="btn">确认</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Clear Logs Modal -->
  <div class="modal" id="clearLogsModal">
    <div class="modal-content">
      <h2>清理日志</h2>
      <form id="clearLogsForm">
        <div class="form-group">
          <label>自动清理保留天数</label>
          <select id="retentionDays">
            <option value="7">7 天</option>
            <option value="14">14 天</option>
            <option value="30" selected>30 天</option>
            <option value="60">60 天</option>
            <option value="90">90 天</option>
          </select>
        </div>
        <div class="form-group">
          <label>手动清理</label>
          <select id="clearDays">
            <option value="7">清除 7 天前</option>
            <option value="14">清除 14 天前</option>
            <option value="30">清除 30 天前</option>
            <option value="all">清除全部</option>
          </select>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-outline" onclick="hideModal('clearLogsModal')">取消</button>
          <button type="button" class="btn" onclick="saveRetention()">保存</button>
          <button type="button" class="btn btn-danger" onclick="clearLogs()">清理</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Tag Modal -->
  <div class="modal" id="tagModal">
    <div class="modal-content">
      <h2>设置标签</h2>
      <form id="tagForm">
        <div class="form-group">
          <label>OpenID</label>
          <input type="text" id="tagOpenId" readonly class="readonly-input">
        </div>
        <div class="form-group">
          <label>备注标签</label>
          <input type="text" id="tagValue" placeholder="输入备注（留空删除）" maxlength="50">
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-outline" onclick="hideModal('tagModal')">取消</button>
          <button type="submit" class="btn">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Block Modal -->
  <div class="modal" id="blockModal">
    <div class="modal-content">
      <h2>拉黑用户</h2>
      <form id="blockForm">
        <div class="form-group">
          <label>OpenID</label>
          <input type="text" id="blockOpenId" readonly class="readonly-input">
        </div>
        <div class="form-group">
          <label>拉黑原因（显示在按钮下方，可选）</label>
          <textarea id="blockReason" rows="2" placeholder="输入拉黑原因"></textarea>
        </div>
        <div class="form-group">
          <label>按钮文字（可选，留空显示默认）</label>
          <input type="text" id="blockBanMessage" placeholder="此 OpenID 已被禁用" maxlength="100">
        </div>
        <div class="form-group">
          <label>自动解封时间（北京时间，留空为永久封禁）</label>
          <input type="datetime-local" id="blockExpiresAt">
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-outline" onclick="hideModal('blockModal')">取消</button>
          <button type="submit" class="btn btn-danger">确认拉黑</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Users Modal -->
  <div class="modal" id="usersModal">
    <div class="modal-content" style="max-width:560px;">
      <h2>所有用户 (<span id="usersCount">0</span>)</h2>
      <div id="usersList" style="max-height:380px;overflow-y:auto;"></div>
      <div class="modal-actions">
        <button type="button" class="btn" onclick="hideModal('usersModal')">关闭</button>
      </div>
    </div>
  </div>

  <!-- Blacklist Modal -->
  <div class="modal" id="blacklistModal">
    <div class="modal-content">
      <h2>黑名单管理</h2>
      <div id="blacklistContent"></div>
      <div class="modal-actions" style="margin-top:16px;">
        <button type="button" class="btn btn-outline" onclick="hideModal('blacklistModal')" style="width:100%">关闭</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;

    // ── 会话管理：自动退出 ──────────────────────────────────────
    function autoLogout(msg) {
      // 清除服务端 Cookie
      fetch(`${API_BASE}/api/admin/logout`, { method: 'POST' }).catch(() => {});
      // 关闭所有弹窗
      document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('loginPage').style.display = 'flex';
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
      const err = document.getElementById('loginError');
      err.textContent = msg || '会话已过期，请重新登录';
      err.style.display = 'block';
    }

    // 全局 fetch 拦截：admin API 返回 401 时自动退出
    const _origFetch = window.fetch.bind(window);
    window.fetch = async function(url, opts) {
      const res = await _origFetch(url, opts);
      if (res.status === 401 && String(url).includes('/api/admin/')) {
        autoLogout('会话已过期，请重新登录');
      }
      return res;
    };
    // ────────────────────────────────────────────────────────────

    // XSS 防护：HTML 实体转义
    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      })[c]);
    }

    // 深色模式
    function updateDarkMode(isDark) {
      if (isDark) {
        document.body.classList.add('dark-mode');
      } else {
        document.body.classList.remove('dark-mode');
      }
      const btn = document.getElementById('darkModeToggle');
      if (btn) btn.textContent = isDark ? '☀️ 浅色' : '🌙 深色';
    }
    function toggleDarkMode() {
      const isDark = !document.body.classList.contains('dark-mode');
      localStorage.setItem('adminDarkMode', isDark ? '1' : '0');
      updateDarkMode(isDark);
    }
    // 初始化深色模式
    (function initDarkMode() {
      const stored = localStorage.getItem('adminDarkMode');
      const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      // 如果有手动设置则使用手动设置，否则跟随系统
      const isDark = stored !== null ? stored === '1' : systemDark;
      updateDarkMode(isDark);
      // 监听系统深色模式变化（仅当没有手动设置时生效）
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
        if (localStorage.getItem('adminDarkMode') === null) {
          updateDarkMode(e.matches);
        }
      });
    })();
    let currentPage = 1;
    let totalPages = 1;
    let totalRecords = 0;
    const PAGE_SIZE_OPTIONS = [10, 20, 50, 100];
    let currentPageSize = PAGE_SIZE_OPTIONS.includes(parseInt(localStorage.getItem('adminPageSize'), 10))
      ? parseInt(localStorage.getItem('adminPageSize'), 10)
      : 20;
    let currentFilters = { openId: '', action: '', device: '', startDate: '', endDate: '' };

    // Cookie 由服务端管理；adminLoggedIn 可读 Cookie 存在时验证后展示后台
    if (document.cookie.includes('adminLoggedIn=')) {
      showDashboard(); // 立即显示，避免登录页闪烁
      _origFetch(`${API_BASE}/api/admin/stats`).then(r => {
        if (r.ok) { loadStats(); loadLogs(); }
        else { autoLogout('登录已失效，请重新登录'); }
      }).catch(() => { loadStats(); loadLogs(); }); // 网络异常时乐观显示
    }

    // 页码输入框回车事件
    document.getElementById('jumpPageInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        jumpToPage();
      }
    });
    document.getElementById('pageSizeSelect').value = String(currentPageSize);
    document.getElementById('pageSizeSelect').addEventListener('change', function(e) {
      const nextSize = parseInt(e.target.value, 10);
      currentPageSize = PAGE_SIZE_OPTIONS.includes(nextSize) ? nextSize : 20;
      localStorage.setItem('adminPageSize', String(currentPageSize));
      currentPage = 1;
      loadLogs();
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        const res = await fetch(`${API_BASE}/api/admin/login`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: document.getElementById('username').value, password: document.getElementById('password').value })
        });
        const data = await res.json();
        if (data.success) { showDashboard(); loadStats(); loadLogs(); }
        else { document.getElementById('loginError').textContent = data.error || '登录失败'; document.getElementById('loginError').style.display = 'block'; }
      } catch (e) { document.getElementById('loginError').textContent = '网络错误'; document.getElementById('loginError').style.display = 'block'; }
    });

    document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        const res = await fetch(`${API_BASE}/api/admin/change-password`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ oldPassword: document.getElementById('oldPassword').value, newPassword: document.getElementById('newPassword').value })
        });
        const data = await res.json();
        if (data.success) { alert('密码修改成功'); hideModal('changePasswordModal'); } else { alert(data.error || '修改失败'); }
      } catch (e) { alert('网络错误'); }
    });

    document.getElementById('tagForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        const res = await fetch(`${API_BASE}/api/admin/tag`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ openId: document.getElementById('tagOpenId').value, tag: document.getElementById('tagValue').value })
        });
        const data = await res.json();
        if (data.success) { hideModal('tagModal'); loadLogs(); } else { alert(data.error || '操作失败'); }
      } catch (e) { alert('网络错误'); }
    });

    document.getElementById('blockForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const expiresAt = document.getElementById('blockExpiresAt').value;
      try {
        const res = await fetch(`${API_BASE}/api/admin/blacklist/add`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            openId: document.getElementById('blockOpenId').value,
            reason: document.getElementById('blockReason').value,
            ban_message: document.getElementById('blockBanMessage').value || null,
            expires_at: expiresAt || null
          })
        });
        const data = await res.json();
        if (data.success) { hideModal('blockModal'); loadStats(); loadLogs(); } else { alert(data.error || '操作失败'); }
      } catch (e) { alert('网络错误'); }
    });

    function showDashboard() { document.getElementById('loginPage').style.display = 'none'; document.getElementById('dashboard').style.display = 'block'; }
    async function logout() {
      await fetch(`${API_BASE}/api/admin/logout`, { method: 'POST' }).catch(() => {});
      location.reload();
    }

    // ── 日志/用户/黑名单按钮事件委托（替代 onclick 字符串注入）────────────────────
    function handleActionClick(e) {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      const action = btn.dataset.action;
      const openId = btn.dataset.openid;
      const tag = btn.dataset.tag || '';
      if (action === 'tag')     showTagModal(openId, tag);
      else if (action === 'delete')  deleteUserLogs(openId);
      else if (action === 'unblock') unblockUser(openId);
      else if (action === 'block')   showBlockModal(openId);
      else if (action === 'filter')  filterByUser(openId);
    }
    document.getElementById('logsTable').addEventListener('click', handleActionClick);
    document.getElementById('logCards').addEventListener('click', handleActionClick);
    document.getElementById('blacklistContent').addEventListener('click', handleActionClick);
    document.getElementById('usersList').addEventListener('click', handleActionClick);
    // ──────────────────────────────────────────────────────────────────────────────

    function updateTableScrollHints() {
      const wrapper = document.getElementById('logsTableWrapper');
      const shell = document.getElementById('logsTableShell');
      if (!wrapper || !shell) return;
      const maxScroll = wrapper.scrollWidth - wrapper.clientWidth;
      const isScrollable = maxScroll > 1;
      shell.classList.toggle('is-scrollable', isScrollable);
      shell.classList.toggle('is-scroll-start', !isScrollable || wrapper.scrollLeft <= 1);
      shell.classList.toggle('is-scroll-end', !isScrollable || wrapper.scrollLeft >= maxScroll - 1);
    }

    function setupTableScrollHints() {
      const wrapper = document.getElementById('logsTableWrapper');
      if (!wrapper) return;
      wrapper.addEventListener('scroll', updateTableScrollHints, { passive: true });
      window.addEventListener('resize', updateTableScrollHints);
      if ('ResizeObserver' in window) {
        new ResizeObserver(updateTableScrollHints).observe(wrapper);
      }
      updateTableScrollHints();
    }
    setupTableScrollHints();

    function showModal(id) { document.getElementById(id).style.display = 'flex'; }
    function hideModal(id) { document.getElementById(id).style.display = 'none'; }
    function showChangePasswordModal() { showModal('changePasswordModal'); }
    function showClearLogsModal() { showModal('clearLogsModal'); }

    function showTagModal(openId, currentTag) {
      document.getElementById('tagOpenId').value = openId;
      document.getElementById('tagValue').value = currentTag || '';
      showModal('tagModal');
    }

    function showBlockModal(openId) {
      document.getElementById('blockOpenId').value = openId;
      document.getElementById('blockReason').value = '';
      document.getElementById('blockBanMessage').value = '';
      document.getElementById('blockExpiresAt').value = '';
      showModal('blockModal');
    }

    async function deleteUserLogs(openId) {
      if (!confirm(`确定删除 ${openId} 的所有记录吗？此操作不可恢复。`)) return;
      try {
        const res = await fetch(`${API_BASE}/api/admin/delete-user-logs`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ openId })
        });
        const data = await res.json();
        if (data.success) {
          alert(`已删除 ${data.deleted} 条记录`);
          loadStats();
          loadLogs();
        } else {
          alert(data.error || "删除失败");
        }
      } catch (e) { console.error(e); alert("删除失败"); }
    }

    async function unblockUser(openId) {
      if (!confirm('确定要解除拉黑吗？')) return;
      try {
        const res = await fetch(`${API_BASE}/api/admin/blacklist/remove`, {

    function resetFilters() {
      document.getElementById('filterOpenId').value = '';

    async function loadStats() {

    async function loadLogs() {
      try {
        const params = new URLSearchParams({ page: currentPage, limit: currentPageSize });
        if (currentFilters.openId) params.append('openId', currentFilters.openId);
        if (currentFilters.action) params.append('action', currentFilters.action);
        if (currentFilters.device) params.append('device', currentFilters.device);
        if (currentFilters.startDate) params.append('startDate', currentFilters.startDate);
        if (currentFilters.endDate) params.append('endDate', currentFilters.endDate);

        const res = await fetch(`${API_BASE}/api/admin/logs?${params}`, { headers: {} });
        const data = await res.json();
        if (data.success) {
          totalPages = data.pagination.totalPages || 1;
          totalRecords = data.pagination.total;
          renderLogs(data.data);
          renderLogCards(data.data);
          renderPagination(data.pagination);
        }
      } catch (e) { console.error(e); }
    }

    // 详细设备解析
    function parseDevice(ua) {
      if (!ua) return { name: '未知', detail: '', badge: '', browser: '' };

      let name = '未知', detail = '', badge = '', browser = '';

      // 解析操作系统和设备
      if (/iPhone/.test(ua)) {
        name = 'iPhone';
        badge = 'ios';
        const iosMatch = ua.match(/iPhone OS ([\d_]+)/);
        if (iosMatch) {
          const iosVer = iosMatch[1].replace(/_/g, '.');
          detail = `iOS ${iosVer}`;
        }
      } else if (/iPad/.test(ua)) {
        name = 'iPad';
        badge = 'ios';
        const iosMatch = ua.match(/CPU OS ([\d_]+)/);
        if (iosMatch) {
          const iosVer = iosMatch[1].replace(/_/g, '.');
          detail = `iPadOS ${iosVer}`;
        }
      } else if (/Android/.test(ua)) {
        badge = 'android';
        const modelMatch = ua.match(/;\s*([^;)]+)\s*Build/);
        const verMatch = ua.match(/Android ([\d.]+)/);
        if (modelMatch && modelMatch[1]) {
          name = modelMatch[1].trim();
        } else {
          name = 'Android';
        }
        if (verMatch) {
          detail = `Android ${verMatch[1]}`;
        }
      } else if (/Mac OS X/.test(ua)) {
        name = 'Mac';
        badge = 'mac';
        const macMatch = ua.match(/Mac OS X ([\d_]+)/);
        if (macMatch) {
          const macVer = macMatch[1].replace(/_/g, '.');
          detail = `macOS ${macVer}`;
        }
      } else if (/Windows NT/.test(ua)) {
        name = 'Windows';
        badge = 'windows';
        const winMatch = ua.match(/Windows NT ([\d.]+)/);
        if (winMatch) {
          const winVer = { '10.0': '10/11', '6.3': '8.1', '6.2': '8', '6.1': '7' }[winMatch[1]] || winMatch[1];
          detail = `Windows ${winVer}`;
        }
      } else if (/Linux/.test(ua)) {
        name = 'Linux';
      }

      // 解析浏览器
      if (/MicroMessenger/.test(ua)) {
        browser = '微信';
        badge = 'wechat';
        const wxMatch = ua.match(/MicroMessenger\/([\d.]+)/);
        if (wxMatch) browser = `微信 ${wxMatch[1].split('.').slice(0,2).join('.')}`;
      } else if (/Edg\//.test(ua)) {
        browser = 'Edge';
        const edgeMatch = ua.match(/Edg\/([\d]+)/);
        if (edgeMatch) browser = `Edge ${edgeMatch[1]}`;
      } else if (/Chrome\//.test(ua) && !/Edg\//.test(ua)) {
        browser = 'Chrome';
        const chromeMatch = ua.match(/Chrome\/([\d]+)/);
        if (chromeMatch) browser = `Chrome ${chromeMatch[1]}`;
      } else if (/Safari\//.test(ua) && !/Chrome\//.test(ua)) {
        browser = 'Safari';
        const safariMatch = ua.match(/Version\/([\d.]+)/);
        if (safariMatch) browser = `Safari ${safariMatch[1].split('.').slice(0,2).join('.')}`;
      } else if (/Firefox\//.test(ua)) {
        browser = 'Firefox';
        const ffMatch = ua.match(/Firefox\/([\d]+)/);
        if (ffMatch) browser = `Firefox ${ffMatch[1]}`;
      }

      return { name, detail, badge, browser };
    }

    function renderOpenIdMeta(log, tagSafe) {
      const items = [];
      if (log.user_name) items.push(`<span class="user-name-sub">${escapeHtml(log.user_name)}</span>`);
      if (log.tag) items.push(`<span class="tag-badge">${tagSafe}</span>`);
      if (log.blocked_reason !== null) items.push('<span class="tag-badge blocked-badge">已拉黑</span>');
      return items.length ? `<div class="openid-meta-row">${items.join('')}</div>` : '';
    }

    function renderLogs(logs) {
      document.getElementById('logsTable').innerHTML = logs.map(log => {
        const device = parseDevice(log.user_agent);
        const openIdSafe = escapeHtml(log.open_id);
        const tagSafe = escapeHtml(log.tag);
        const actionLabel = escapeHtml(formatAction(log.action));
        const openIdMeta = renderOpenIdMeta(log, tagSafe);
        return `
        <tr>
          <td class="table-time-col" style="white-space:nowrap;">${formatDate(log.created_at)}</td>
          <td class="table-openid-col">
            <div class="openid-cell">${openIdSafe}</div>
            ${openIdMeta}
          </td>
          <td class="table-action-col"><span class="action-badge ${getActionClass(log.action)}">${actionLabel}</span></td>
          <td class="table-device-col">
            <div class="device-info">
              <div class="device-main">
                <span class="device-badge ${escapeHtml(device.badge)}">${escapeHtml(device.name)}</span>
                ${device.browser ? `<span class="device-badge">${escapeHtml(device.browser)}</span>` : ''}
              </div>
              ${device.detail ? `<div class="device-detail">${escapeHtml(device.detail)}</div>` : ''}
            </div>
          </td>
          <td class="ip-cell table-ip-col">
            ${escapeHtml(log.ip_address) || '-'}
            ${log.ip_geo ? `<div class="ip-geo">${escapeHtml(log.ip_geo)}</div>` : ''}
          </td>
          <td class="actions-cell table-actions-col">
            <button class="btn-tag" data-action="tag" data-openid="${openIdSafe}" data-tag="${tagSafe}">标签</button><button class="btn-delete" data-action="delete" data-openid="${openIdSafe}">删除</button>
            ${log.blocked_reason !== null
              ? `<button class="btn-unblock" data-action="unblock" data-openid="${openIdSafe}">解黑</button>`
              : `<button class="btn-block" data-action="block" data-openid="${openIdSafe}">拉黑</button>`}
          </td>
        </tr>
      `}).join('');
      requestAnimationFrame(updateTableScrollHints);
    }

    function renderLogCards(logs) {
      document.getElementById('logCards').innerHTML = logs.map(log => {
        const device = parseDevice(log.user_agent);
        const openIdSafe = escapeHtml(log.open_id);
        const tagSafe = escapeHtml(log.tag);
        const actionLabel = escapeHtml(formatAction(log.action));
        const openIdMeta = renderOpenIdMeta(log, tagSafe);
        return `
        <div class="log-card">
          <div class="log-card-header">
            <span class="log-card-time">${formatDate(log.created_at)}</span>
            <span class="action-badge ${getActionClass(log.action)}">${actionLabel}</span>
          </div>
          <div class="log-card-openid">
            ${openIdSafe}
            ${openIdMeta}
          </div>
          <div class="device-info">
            <span class="device-badge ${escapeHtml(device.badge)}">${escapeHtml(device.name)}</span>
            ${device.browser ? `<span class="device-badge">${escapeHtml(device.browser)}</span>` : ''}
            ${device.detail ? `<span class="device-detail" style="margin-left:4px;">${escapeHtml(device.detail)}</span>` : ''}
          </div>
          <div class="log-card-ip">
            ${escapeHtml(log.ip_address) || '-'}
            ${log.ip_geo ? `<div class="ip-geo">${escapeHtml(log.ip_geo)}</div>` : ''}
          </div>
          <div class="log-card-row">
            <div></div>
            <div class="log-card-actions">
              <button class="btn-tag" data-action="tag" data-openid="${openIdSafe}" data-tag="${tagSafe}">标签</button><button class="btn-delete" data-action="delete" data-openid="${openIdSafe}">删除</button>
              ${log.blocked_reason !== null
                ? `<button class="btn-unblock" data-action="unblock" data-openid="${openIdSafe}">解黑</button>`
                : `<button class="btn-block" data-action="block" data-openid="${openIdSafe}">拉黑</button>`}
            </div>
          </div>
        </div>
      `}).join('');
    }

    function renderPagination(p) {
      let html = '';

      // 首页
      html += `<button onclick="goToPage(1)" ${p.page <= 1 ? 'disabled' : ''}>首页</button>`;
      html += `<button onclick="goToPage(${p.page - 1})" ${p.page <= 1 ? 'disabled' : ''}>上页</button>`;

      // 页码按钮
      const start = Math.max(1, p.page - 2);
      const end = Math.min(p.totalPages, p.page + 2);

      if (start > 1) {
        html += `<button onclick="goToPage(1)">1</button>`;
        if (start > 2) html += `<span style="padding:0 4px;color:var(--ink-2);">…</span>`;
      }

      for (let i = start; i <= end; i++) {
        html += `<button class="${i === p.page ? 'current' : ''}" onclick="goToPage(${i})">${i}</button>`;
      }

      if (end < p.totalPages) {
        if (end < p.totalPages - 1) html += `<span style="padding:0 4px;color:var(--ink-2);">…</span>`;
        html += `<button onclick="goToPage(${p.totalPages})">${p.totalPages}</button>`;
      }

      html += `<button onclick="goToPage(${p.page + 1})" ${p.page >= p.totalPages ? 'disabled' : ''}>下页</button>`;
      html += `<button onclick="goToPage(${p.totalPages})" ${p.page >= p.totalPages ? 'disabled' : ''}>末页</button>`;

      document.getElementById('paginationNav').innerHTML = html;

      // 更新跳转输入框
      document.getElementById('pageSizeSelect').value = String(p.limit || currentPageSize);
      document.getElementById('jumpPageInput').value = p.page;
      document.getElementById('jumpPageInput').max = p.totalPages;
      document.getElementById('pageInfo').textContent = `第 ${p.page} 页，共 ${p.totalPages} 页，共 ${p.total} 条记录，每页 ${p.limit || currentPageSize} 条`;
    }

    function jumpToPage() {
      const input = document.getElementById('jumpPageInput');
      let page = parseInt(input.value);
      if (isNaN(page) || page < 1) page = 1;
      if (page > totalPages) page = totalPages;
      input.value = page;
      goToPage(page);
    }

    function goToPage(page) {
      if (page < 1) page = 1;
      if (page > totalPages) page = totalPages;
      currentPage = page;
      loadLogs();
      // 滚动到顶部
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ===== 通知管理 =====
    async function showNotificationModal() {
      try {
        const res = await fetch('/api/admin/notification', {
          headers: {}
        });
        const n = res.ok ? await res.json() : null;
        if (n) {
          document.getElementById('notifAdminTitle').value = n.title || '';
          document.getElementById('notifAdminContent').value = n.content || '';
          document.getElementById('notifAdminType').value = n.type || 'once';
          const active = n.is_active === 1;
          document.getElementById('notifAdminStatus').innerHTML =
            active
              ? '<span style="color:#2d7a4a;">● 当前有活跃通知（' + (n.type === 'always' ? '每次弹出' : '首次弹出') + '）</span>'
              : '<span style="color:var(--ink-2);">● 当前无活跃通知</span>';
        } else {
          document.getElementById('notifAdminTitle').value = '';
          document.getElementById('notifAdminContent').value = '';
          document.getElementById('notifAdminType').value = 'once';
          document.getElementById('notifAdminStatus').innerHTML = '<span style="color:var(--ink-2);">● 当前无活跃通知</span>';
        }
      } catch (e) {
        document.getElementById('notifAdminStatus').innerHTML = '<span style="color:var(--accent);">● 加载失败</span>';
      }
      document.getElementById('notificationModal').style.display = 'flex';
    }

    async function saveNotification() {
      const title = document.getElementById('notifAdminTitle').value.trim();
      const content = document.getElementById('notifAdminContent').value.trim();
      const type = document.getElementById('notifAdminType').value;
      if (!title || !content) { alert('请填写标题和内容'); return; }
      try {
        const res = await fetch('/api/admin/notification', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, content, type, is_active: true })
        });
        if (res.ok) {
          hideModal('notificationModal');
          showAdminToast('通知已发布');
        } else {
          const err = await res.json();
          alert(err.error || '发布失败');
        }
      } catch (e) { alert('网络错误'); }
    }

    async function disableNotification() {
      if (!confirm('确认停用当前通知？')) return;
      try {
        const res = await fetch('/api/admin/notification', {
          method: 'DELETE',
          headers: {}
        });
        if (res.ok) {
          hideModal('notificationModal');
          showAdminToast('通知已停用');
        }
      } catch (e) { alert('网络错误'); }
    }

    function showAdminToast(msg) {
      let t = document.getElementById('adminToast');
      if (!t) {
        t = document.createElement('div');
        t.id = 'adminToast';
        t.style.cssText = 'position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--bg);padding:10px 20px;font-family:\'IBM Plex Mono\',monospace;font-size:12px;z-index:9999;opacity:0;transition:opacity 0.2s;white-space:nowrap;border-left:3px solid var(--accent);';
        document.body.appendChild(t);
      }
      t.textContent = msg;
      t.style.opacity = '1';
      clearTimeout(t._timer);
      t._timer = setTimeout(() => { t.style.opacity = '0'; }, 2000);
    }

    function formatDate(d) { return new Date(d + 'Z').toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' }); }
    function formatShortDate(d) { return new Date(d + 'Z').toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }); }
    function formatAction(a) { var m = { 'qr_manual': '手动刷新', 'qr_auto': '自动刷新', 'qr_timeout': '生成超时', 'qr_blocked': '已被拉黑', 'page_load': '页面加载', 'admin_verify_attempt': '管理员验证', 'admin_verify_success': '验证成功' }; return m[a] || '未知操作'; }
    function getActionClass(a) { if (a === 'qr_manual') return 'manual'; if (a === 'qr_auto') return 'auto'; if (a === 'qr_timeout') return 'timeout'; if (a === 'qr_blocked') return 'blocked'; if (a.includes('success')) return 'success'; if (a.includes('verify')) return 'verify'; if (a.includes('load')) return 'load'; return 'refresh'; }
  </script>

  <!-- 通知管理弹窗 -->
  <div class="modal" id="notificationModal" style="display:none;position:fixed;inset:0;background:rgba(26,26,26,0.7);z-index:1000;align-items:center;justify-content:center;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);">
    <div class="modal-content" style="max-width:440px;width:calc(100vw - 48px);">
      <h2>管理员通知</h2>
      <div id="notifAdminStatus"></div>
      <div class="form-group">
        <label>通知标题</label>
        <input type="text" id="notifAdminTitle" placeholder="通知标题（最多100字符）" maxlength="100">
      </div>
      <div class="form-group">
        <label>通知内容</label>
        <textarea id="notifAdminContent" rows="5" placeholder="通知内容，支持换行（最多1000字符）" maxlength="1000" style="resize:vertical;"></textarea>
      </div>
      <div class="form-group">
        <label>弹出方式</label>
        <select id="notifAdminType">
          <option value="once">仅首次打开时弹出</option>
          <option value="always">每次打开都弹出</option>
        </select>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" onclick="hideModal('notificationModal')">取消</button>
        <button type="button" class="btn btn-danger" onclick="disableNotification()">停用</button>
        <button type="button" class="btn" onclick="saveNotification()">发布</button>
      </div>
    </div>
  </div>

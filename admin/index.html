<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>慧湖通管理后台</title>
  <meta name="theme-color" content="#dde8f5">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600&display=swap"></noscript>
  <style>
    :root {
      --bg-primary: #eef2f7;
      --bg-secondary: rgba(255, 255, 255, 0.72);
      --text-primary: #0d1117;
      --text-secondary: #5e6778;
      --accent-color: #3b82f6;
      --accent-hover: #2563eb;
      --border-color: rgba(0, 0, 0, 0.07);
      --shadow: 0 4px 24px rgba(59, 130, 246, 0.10);
      --mesh-bg: #dde8f5;
      --mesh-blob-1: radial-gradient(ellipse 60% 55% at 15% 20%, rgba(186,210,255,0.75) 0%, transparent 70%);
      --mesh-blob-2: radial-gradient(ellipse 50% 60% at 85% 75%, rgba(196,181,253,0.60) 0%, transparent 65%);
      --mesh-blob-3: radial-gradient(ellipse 45% 40% at 50% 50%, rgba(147,197,253,0.40) 0%, transparent 60%);
      --glass-bg: rgba(255, 255, 255, 0.62);
      --glass-bg-strong: rgba(255, 255, 255, 0.80);
      --glass-bg-subtle: rgba(255, 255, 255, 0.38);
      --glass-border: rgba(255, 255, 255, 0.85);
      --glass-border-subtle: rgba(255, 255, 255, 0.45);
      --glass-blur: 18px;
      --glass-blur-heavy: 28px;
      --glass-blur-subtle: 10px;
      --accent-glow: rgba(59, 130, 246, 0.22);
      --accent-glow-hover: rgba(59, 130, 246, 0.32);
      --success-color: #22c55e;
      --danger-color: #ef4444;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 24px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.04);
      --shadow-lg: 0 8px 40px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.05);
      --shadow-glow: 0 4px 24px rgba(59,130,246,0.18);
      --header-bg: rgba(238, 242, 247, 0.90);
      --input-bg: rgba(255, 255, 255, 0.75);
      --input-border: rgba(0, 0, 0, 0.10);
      --input-border-focus: rgba(59, 130, 246, 0.70);
      --overlay-bg: rgba(200, 215, 235, 0.65);
      --overlay-blur: 24px;
      --table-header-bg: rgba(240, 246, 255, 0.75);
      --table-row-hover: rgba(59, 130, 246, 0.05);
      --table-border: rgba(0, 0, 0, 0.055);
      --stat-accent-total: linear-gradient(135deg, #3b82f6, #6366f1);
      --stat-accent-unique: linear-gradient(135deg, #8b5cf6, #a78bfa);
      --stat-accent-today: linear-gradient(135deg, #22c55e, #4ade80);
      --stat-accent-blocked: linear-gradient(135deg, #ef4444, #f87171);
      --stat-accent-retain: linear-gradient(135deg, #f59e0b, #fbbf24);
      --transition-fast: all 0.18s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-med: all 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme="dark"] {
      --bg-primary: #090c14;
      --bg-secondary: rgba(255, 255, 255, 0.055);
      --text-primary: #e8eaf6;
      --text-secondary: #8892b0;
      --accent-color: #60a5fa;
      --accent-hover: #93c5fd;
      --border-color: rgba(255, 255, 255, 0.08);
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.45);
      --mesh-bg: #090c14;
      --mesh-blob-1: radial-gradient(ellipse 65% 60% at 10% 15%, rgba(79,70,229,0.50) 0%, transparent 70%);
      --mesh-blob-2: radial-gradient(ellipse 55% 65% at 88% 80%, rgba(124,58,237,0.45) 0%, transparent 65%);
      --mesh-blob-3: radial-gradient(ellipse 50% 45% at 55% 45%, rgba(59,130,246,0.25) 0%, transparent 60%);
      --glass-bg: rgba(255, 255, 255, 0.055);
      --glass-bg-strong: rgba(255, 255, 255, 0.095);
      --glass-bg-subtle: rgba(255, 255, 255, 0.030);
      --glass-border: rgba(255, 255, 255, 0.12);
      --glass-border-subtle: rgba(255, 255, 255, 0.065);
      --accent-glow: rgba(96, 165, 250, 0.35);
      --accent-glow-hover: rgba(96, 165, 250, 0.50);
      --success-color: #34d399;
      --danger-color: #f87171;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.35);
      --shadow-md: 0 4px 28px rgba(0,0,0,0.45), 0 1px 4px rgba(0,0,0,0.25);
      --shadow-lg: 0 10px 50px rgba(0,0,0,0.55), 0 3px 12px rgba(0,0,0,0.30);
      --shadow-glow: 0 4px 28px rgba(96,165,250,0.30), 0 0 60px rgba(124,58,237,0.15);
      --header-bg: rgba(9, 12, 20, 0.90);
      --input-bg: rgba(255, 255, 255, 0.065);
      --input-border: rgba(255, 255, 255, 0.12);
      --input-border-focus: rgba(96, 165, 250, 0.70);
      --overlay-bg: rgba(0, 0, 0, 0.65);
      --table-header-bg: rgba(255, 255, 255, 0.05);
      --table-row-hover: rgba(96, 165, 250, 0.07);
      --table-border: rgba(255, 255, 255, 0.07);
      --stat-accent-total: linear-gradient(135deg, #3b82f6, #6366f1);
      --stat-accent-unique: linear-gradient(135deg, #8b5cf6, #c084fc);
      --stat-accent-today: linear-gradient(135deg, #10b981, #34d399);
      --stat-accent-blocked: linear-gradient(135deg, #ef4444, #fca5a5);
      --stat-accent-retain: linear-gradient(135deg, #f59e0b, #fde68a);
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg-primary: #090c14;
        --bg-secondary: rgba(255, 255, 255, 0.055);
        --text-primary: #e8eaf6;
        --text-secondary: #8892b0;
        --accent-color: #60a5fa;
        --accent-hover: #93c5fd;
        --border-color: rgba(255, 255, 255, 0.08);
        --mesh-bg: #090c14;
        --mesh-blob-1: radial-gradient(ellipse 65% 60% at 10% 15%, rgba(79,70,229,0.50) 0%, transparent 70%);
        --mesh-blob-2: radial-gradient(ellipse 55% 65% at 88% 80%, rgba(124,58,237,0.45) 0%, transparent 65%);
        --mesh-blob-3: radial-gradient(ellipse 50% 45% at 55% 45%, rgba(59,130,246,0.25) 0%, transparent 60%);
        --glass-bg: rgba(255, 255, 255, 0.055);
        --glass-bg-strong: rgba(255, 255, 255, 0.095);
        --glass-bg-subtle: rgba(255, 255, 255, 0.030);
        --glass-border: rgba(255, 255, 255, 0.12);
        --glass-border-subtle: rgba(255, 255, 255, 0.065);
        --accent-glow: rgba(96, 165, 250, 0.35);
        --accent-glow-hover: rgba(96, 165, 250, 0.50);
        --shadow-sm: 0 2px 8px rgba(0,0,0,0.35);
        --shadow-md: 0 4px 28px rgba(0,0,0,0.45), 0 1px 4px rgba(0,0,0,0.25);
        --shadow-lg: 0 10px 50px rgba(0,0,0,0.55), 0 3px 12px rgba(0,0,0,0.30);
        --header-bg: rgba(9, 12, 20, 0.90);
        --input-bg: rgba(255, 255, 255, 0.065);
        --input-border: rgba(255, 255, 255, 0.12);
        --input-border-focus: rgba(96, 165, 250, 0.70);
        --overlay-bg: rgba(0, 0, 0, 0.65);
        --table-header-bg: rgba(255, 255, 255, 0.05);
        --table-row-hover: rgba(96, 165, 250, 0.07);
        --table-border: rgba(255, 255, 255, 0.07);
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
      background-color: var(--mesh-bg);
      background-image: var(--mesh-blob-1), var(--mesh-blob-2), var(--mesh-blob-3);
      background-attachment: fixed;
      min-height: 100vh;
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      transition: background-color 0.35s ease, color 0.35s ease;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: var(--mesh-blob-1), var(--mesh-blob-2), var(--mesh-blob-3);
      animation: blob-drift 18s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes blob-drift {
      0%   { transform: translate(0, 0) scale(1); }
      33%  { transform: translate(2%, 1.5%) scale(1.02); }
      66%  { transform: translate(-1.5%, 2%) scale(0.98); }
      100% { transform: translate(1%, -2%) scale(1.01); }
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes modal-appear {
      from { opacity: 0; transform: scale(0.94) translateY(16px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .login-container { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; position: relative; z-index: 1; }
    .has-token .login-container { display: none !important; }
    .has-token .dashboard { display: block !important; }
    .login-box {
      background: var(--glass-bg-strong);
      backdrop-filter: blur(var(--glass-blur-heavy)) saturate(180%);
      -webkit-backdrop-filter: blur(var(--glass-blur-heavy)) saturate(180%);
      border: 1px solid var(--glass-border);
      padding: 40px; border-radius: 24px; box-shadow: var(--shadow-lg); width: 100%; max-width: 360px;
      animation: modal-appear 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    .login-box h1 { font-size: 24px; margin-bottom: 30px; text-align: center; color: var(--text-primary); }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--text-secondary); font-size: 14px; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 14px 16px;
      border: 1px solid var(--input-border); border-radius: 12px;
      font-size: 16px; font-family: inherit; transition: border-color 0.2s, box-shadow 0.2s;
      background: var(--input-bg);
      backdrop-filter: blur(var(--glass-blur-subtle));
      -webkit-backdrop-filter: blur(var(--glass-blur-subtle));
      color: var(--text-primary);
      box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.04);
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline: none; border-color: var(--input-border-focus);
      box-shadow: 0 0 0 3px var(--accent-glow), inset 0 2px 6px rgba(0,0,0,0.04);
      background: var(--glass-bg-strong);
    }
    .readonly-input { background: var(--glass-bg-subtle) !important; font-size: 12px; opacity: 0.8; }
    .btn {
      padding: 14px 20px;
      background: linear-gradient(135deg, rgba(59,130,246,0.90) 0%, rgba(99,102,241,0.90) 100%);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.25);
      color: white;
      border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: var(--transition-fast);
      box-shadow: 0 4px 20px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,0.25);
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 28px var(--accent-glow-hover), inset 0 1px 0 rgba(255,255,255,0.30); }
    .btn:active { transform: translateY(0) scale(0.98); }
    .btn-danger {
      background: linear-gradient(135deg, rgba(239,68,68,0.90) 0%, rgba(220,38,38,0.90) 100%);
      box-shadow: 0 4px 20px rgba(239, 68, 68, 0.35);
    }
    .btn-small { padding: 8px 14px; font-size: 13px; border-radius: 8px; }
    .btn-outline {
      background: var(--glass-bg-subtle);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: var(--accent-color);
      border: 1px solid var(--accent-color);
      box-shadow: none;
    }
    .error-msg { color: var(--danger-color); font-size: 14px; margin-top: 15px; text-align: center; display: none; }
    .dashboard { display: none; position: relative; z-index: 1; }
    .header {
      background: var(--header-bg);
      backdrop-filter: blur(var(--glass-blur-subtle)) saturate(160%);
      -webkit-backdrop-filter: blur(var(--glass-blur-subtle)) saturate(160%);
      border-bottom: 1px solid var(--glass-border-subtle);
      padding: 16px 24px; box-shadow: var(--shadow-sm);
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;
      position: sticky; top: 0; z-index: 100;
      transition: background 0.35s ease, border-color 0.35s ease;
    }
    .header h1 { font-size: 20px; color: var(--text-primary); }
    .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-secondary {
      padding: 10px 16px;
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur-subtle));
      -webkit-backdrop-filter: blur(var(--glass-blur-subtle));
      border: 1px solid var(--glass-border);
      color: var(--text-primary); border-radius: 10px; font-size: 14px; font-weight: 500;
      cursor: pointer; font-family: inherit; transition: var(--transition-fast);
      box-shadow: var(--shadow-sm);
    }
    .btn-secondary:hover { background: var(--glass-bg-strong); box-shadow: var(--shadow-md); transform: translateY(-1px); }
    .content { padding: 20px; max-width: 1400px; margin: 0 auto; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .stat-card {
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur)) saturate(180%);
      -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(180%);
      border: 1px solid var(--glass-border);
      padding: 16px; border-radius: 16px; box-shadow: var(--shadow-sm);
      position: relative; overflow: hidden; transition: var(--transition-med);
    }
    .stat-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      border-radius: 16px 16px 0 0;
    }
    .stat-card[data-stat="total"]::before   { background: var(--stat-accent-total); }
    .stat-card[data-stat="unique"]::before  { background: var(--stat-accent-unique); }
    .stat-card[data-stat="today"]::before   { background: var(--stat-accent-today); }
    .stat-card[data-stat="blocked"]::before { background: var(--stat-accent-blocked); }
    .stat-card[data-stat="retain"]::before  { background: var(--stat-accent-retain); }
    .stat-card .value { font-size: 26px; font-weight: 700; color: var(--accent-color); font-variant-numeric: tabular-nums; }
    .stat-card .value.danger { color: var(--danger-color); }
    .stat-card .label { color: var(--text-secondary); margin-top: 6px; font-size: 12px; font-weight: 500; letter-spacing: 0.03em; }
    .stat-card[onclick]:hover { transform: translateY(-3px); box-shadow: var(--shadow-md), var(--shadow-glow); background: var(--glass-bg-strong); }
    .card {
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur)) saturate(180%);
      -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(180%);
      border: 1px solid var(--glass-border);
      border-radius: 16px; box-shadow: var(--shadow-sm); overflow: hidden; margin-bottom: 20px;
      transition: var(--transition-med);
    }
    .card-header { padding: 16px; border-bottom: 1px solid var(--glass-border-subtle); }
    .card-header h2 { font-size: 17px; margin-bottom: 12px; color: var(--text-primary); }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .filter-input {
      padding: 10px 14px;
      border: 1px solid var(--input-border); border-radius: 10px; font-size: 14px; font-family: inherit; min-width: 0;
      background: var(--input-bg);
      backdrop-filter: blur(var(--glass-blur-subtle));
      -webkit-backdrop-filter: blur(var(--glass-blur-subtle));
      color: var(--text-primary);
    }
    .filter-input:focus { outline: none; border-color: var(--input-border-focus); box-shadow: 0 0 0 3px var(--accent-glow); background: var(--glass-bg-strong); }
    .filter-select {
      padding: 10px 14px;
      border: 1px solid var(--input-border); border-radius: 10px; font-size: 14px; font-family: inherit;
      background: var(--input-bg);
      backdrop-filter: blur(var(--glass-blur-subtle));
      -webkit-backdrop-filter: blur(var(--glass-blur-subtle));
      color: var(--text-primary); min-width: 0;
    }
    .filter-select:focus { outline: none; border-color: var(--input-border-focus); box-shadow: 0 0 0 3px var(--accent-glow); }
    .filter-input[type="date"] { width: 130px; flex: 0 0 auto; }
    .filter-btn { padding: 10px 16px; background: var(--accent-color); color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; transition: var(--transition-fast); }
    .filter-btn:hover { opacity: 0.9; }
    .filter-btn.reset { background: var(--glass-bg); color: var(--text-primary); border: 1px solid var(--glass-border); }
    table { width: 100%; border-collapse: separate; border-spacing: 0; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--table-border); font-size: 13px; color: var(--text-primary); }
    th {
      font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.06em;
      background: var(--table-header-bg);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      font-size: 11px; position: sticky; top: 0; z-index: 2;
    }
    tr:hover td { background: var(--table-row-hover); }
    .openid-cell { font-family: 'SF Mono', Monaco, monospace; font-size: 11px; color: var(--text-primary); word-break: break-all; line-height: 1.4; }
    .tag-badge {
      padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 500;
      background: rgba(194, 24, 91, 0.12); color: #c2185b;
      border: 1px solid rgba(194, 24, 91, 0.20);
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      margin-top: 4px; display: inline-block;
    }
    .blocked-badge { background: rgba(198, 40, 40, 0.12); color: #c62828; border: 1px solid rgba(198,40,40,0.20); }
    .action-badge {
      padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; white-space: nowrap;
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.20);
    }
    .action-badge.refresh { background: rgba(25, 118, 210, 0.12); color: #1976d2; border-color: rgba(25,118,210,0.20); }
    .action-badge.verify { background: rgba(245, 124, 0, 0.12); color: #f57c00; border-color: rgba(245,124,0,0.20); }
    .action-badge.success { background: rgba(56, 142, 60, 0.12); color: #388e3c; border-color: rgba(56,142,60,0.20); }
    .action-badge.load { background: rgba(123, 31, 162, 0.12); color: #7b1fa2; border-color: rgba(123,31,162,0.20); }
    .action-badge.manual { background: rgba(21, 101, 192, 0.12); color: #1565c0; border-color: rgba(21,101,192,0.20); }
    .action-badge.auto { background: rgba(0, 131, 143, 0.12); color: #00838f; border-color: rgba(0,131,143,0.20); }
    .action-badge.timeout { background: rgba(255, 143, 0, 0.12); color: #ff8f00; border-color: rgba(255,143,0,0.20); }
    .action-badge.blocked { background: rgba(198, 40, 40, 0.12); color: #c62828; border-color: rgba(198,40,40,0.20); }
    .device-info { font-size: 11px; line-height: 1.5; }
    .device-main { color: var(--text-primary); font-weight: 500; }
    .device-detail { color: var(--text-secondary); font-size: 10px; }
    .device-badge {
      padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 500;
      background: var(--glass-bg-subtle); color: var(--text-secondary);
      border: 1px solid var(--glass-border-subtle);
      display: inline-block; margin-right: 4px; margin-bottom: 2px;
    }
    .device-badge.ios { background: rgba(25,118,210,0.10); color: #1976d2; }
    .device-badge.android { background: rgba(56,142,60,0.10); color: #388e3c; }
    .device-badge.mac { background: rgba(123,31,162,0.10); color: #7b1fa2; }
    .device-badge.windows { background: rgba(245,124,0,0.10); color: #f57c00; }
    .device-badge.wechat { background: rgba(7,193,96,0.10); color: #07c160; }
    .ip-cell { font-family: 'SF Mono', Monaco, monospace; font-size: 11px; color: var(--text-secondary); word-break: break-all; }
    .actions-cell { white-space: nowrap; }
    .actions-cell button { margin-right: 4px; padding: 4px 8px; font-size: 11px; border-radius: 6px; cursor: pointer; border: 1px solid transparent; font-family: inherit; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); transition: var(--transition-fast); }

  <!-- 防止已登录时刷新页面闪过登录页，同时初始化主题 -->
  <script>
  (function() {
    function getCookie(n) {
      const m = document.cookie.split(';').find(c => c.trim().startsWith(n + '='));
      return m ? m.split('=').slice(1).join('=').trim() : null;
    }
    if (getCookie('adminLoggedIn')) document.documentElement.classList.add('has-token');
    // 初始化主题（防止 FOUC）
    const stored = localStorage.getItem('adminDarkMode');
    const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const isDark = stored !== null ? stored === '1' : systemDark;
    document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
    const metaTheme = document.querySelector('meta[name="theme-color"]');
    if (metaTheme) metaTheme.setAttribute('content', isDark ? '#090c14' : '#dde8f5');
  })();
</script>

<body>
  <div class="login-container" id="loginPage">
    <div class="login-box">

    <div class="content">

  <script>
    const API_BASE = window.location.origin;
    // ── 会话管理：自动退出 ──────────────────────────────────────
    function autoLogout(msg) {
      // 清除服务端 Cookie
      fetch(`${API_BASE}/api/admin/logout`, { method: 'POST' }).catch(() => {});
      // 关闭所有弹窗
      document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('loginPage').style.display = 'flex';
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
      const err = document.getElementById('loginError');
      err.textContent = msg || '会话已过期，请重新登录';
      err.style.display = 'block';
    }

    // 全局 fetch 拦截：admin API 返回 401 时自动退出
    const _origFetch = window.fetch.bind(window);
    window.fetch = async function(url, opts) {
      const res = await _origFetch(url, opts);
      if (res.status === 401 && String(url).includes('/api/admin/')) {
        autoLogout('会话已过期，请重新登录');
      }
      return res;
    };
    // ────────────────────────────────────────────────────────────

    // XSS 防护：HTML 实体转义
    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      })[c]);

    // 深色模式
    function updateDarkMode(isDark) {
      if (isDark) {
        document.body.classList.add('dark-mode');
      } else {
        document.body.classList.remove('dark-mode');
      }
      // 同步 data-theme 属性，使 [data-theme="dark"] CSS 变量生效
      document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
      const metaTheme = document.querySelector('meta[name="theme-color"]');
      if (metaTheme) metaTheme.setAttribute('content', isDark ? '#090c14' : '#dde8f5');
      const btn = document.getElementById('darkModeToggle');
      if (btn) btn.textContent = isDark ? '☀️ 浅色' : '🌙 深色';
    }
    function toggleDarkMode() {
      const isDark = !document.body.classList.contains('dark-mode');
      localStorage.setItem('adminDarkMode', isDark ? '1' : '0');
      updateDarkMode(isDark);
    }
    // 初始化深色模式

      const stored = localStorage.getItem('adminDarkMode');
      const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      // 如果有手动设置则使用手动设置，否则跟随系统
      const isDark = stored !== null ? stored === '1' : systemDark;
      updateDarkMode(isDark);
      // 监听系统深色模式变化（仅当没有手动设置时生效）
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {

    // 详细设备解析
    function parseDevice(ua) {
      if (!ua) return { name: '未知', detail: '', badge: '', browser: '' };

      let name = '未知', detail = '', badge = '', browser = '';

      // 解析操作系统和设备
      if (/iPhone/.test(ua)) {
        name = 'iPhone';
        badge = 'ios';
        const iosMatch = ua.match(/iPhone OS ([\d_]+)/);
        if (iosMatch) {
          const iosVer = iosMatch[1].replace(/_/g, '.');
          detail = `iOS ${iosVer}`;
        }
      } else if (/iPad/.test(ua)) {
        name = 'iPad';
        badge = 'ios';
        const iosMatch = ua.match(/CPU OS ([\d_]+)/);
        if (iosMatch) {
          const iosVer = iosMatch[1].replace(/_/g, '.');
          detail = `iPadOS ${iosVer}`;
        }
      } else if (/Android/.test(ua)) {
        badge = 'android';
        const modelMatch = ua.match(/;\s*([^;)]+)\s*Build/);
        const verMatch = ua.match(/Android ([\d.]+)/);
        if (modelMatch && modelMatch[1]) {
          name = modelMatch[1].trim();
        } else {
          name = 'Android';
        }
        if (verMatch) {
          detail = `Android ${verMatch[1]}`;
        }
      } else if (/Mac OS X/.test(ua)) {
        name = 'Mac';
        badge = 'mac';
        const macMatch = ua.match(/Mac OS X ([\d_]+)/);
        if (macMatch) {
          const macVer = macMatch[1].replace(/_/g, '.');
          detail = `macOS ${macVer}`;
        }
      } else if (/Windows NT/.test(ua)) {
        name = 'Windows';
        badge = 'windows';
        const winMatch = ua.match(/Windows NT ([\d.]+)/);
        if (winMatch) {
          const winVer = { '10.0': '10/11', '6.3': '8.1', '6.2': '8', '6.1': '7' }[winMatch[1]] || winMatch[1];
          detail = `Windows ${winVer}`;
        }
      } else if (/Linux/.test(ua)) {
        name = 'Linux';
      }

      // 解析浏览器
      if (/MicroMessenger/.test(ua)) {
        browser = '微信';
        badge = 'wechat';
        const wxMatch = ua.match(/MicroMessenger\/([\d.]+)/);
        if (wxMatch) browser = `微信 ${wxMatch[1].split('.').slice(0,2).join('.')}`;
      } else if (/Edg\//.test(ua)) {
        browser = 'Edge';
        const edgeMatch = ua.match(/Edg\/([\d]+)/);
        if (edgeMatch) browser = `Edge ${edgeMatch[1]}`;
      } else if (/Chrome\//.test(ua) && !/Edg\//.test(ua)) {
        browser = 'Chrome';
        const chromeMatch = ua.match(/Chrome\/([\d]+)/);
        if (chromeMatch) browser = `Chrome ${chromeMatch[1]}`;
      } else if (/Safari\//.test(ua) && !/Chrome\//.test(ua)) {
        browser = 'Safari';
        const safariMatch = ua.match(/Version\/([\d.]+)/);
        if (safariMatch) browser = `Safari ${safariMatch[1].split('.').slice(0,2).join('.')}`;
      } else if (/Firefox\//.test(ua)) {
        browser = 'Firefox';
        const ffMatch = ua.match(/Firefox\/([\d]+)/);
        if (ffMatch) browser = `Firefox ${ffMatch[1]}`;
      }

      return { name, detail, badge, browser };
    }

    function renderPagination(p) {
      let html = '';

      // 首页
      html += `<button onclick="goToPage(1)" ${p.page <= 1 ? 'disabled' : ''}>首页</button>`;
      html += `<button onclick="goToPage(${p.page - 1})" ${p.page <= 1 ? 'disabled' : ''}>上页</button>`;

      // 页码按钮
      const start = Math.max(1, p.page - 2);
      const end = Math.min(p.totalPages, p.page + 2);

      if (start > 1) {
        html += `<button onclick="goToPage(1)">1</button>`;
        if (start > 2) html += `<span style="padding:0 4px;color:#999;">…</span>`;
      }

      for (let i = start; i <= end; i++) {
        html += `<button class="${i === p.page ? 'current' : ''}" onclick="goToPage(${i})">${i}</button>`;
      }

      if (end < p.totalPages) {
        if (end < p.totalPages - 1) html += `<span style="padding:0 4px;color:#999;">…</span>`;
        html += `<button onclick="goToPage(${p.totalPages})">${p.totalPages}</button>`;
      }

      html += `<button onclick="goToPage(${p.page + 1})" ${p.page >= p.totalPages ? 'disabled' : ''}>下页</button>`;
      html += `<button onclick="goToPage(${p.totalPages})" ${p.page >= p.totalPages ? 'disabled' : ''}>末页</button>`;

      document.getElementById('paginationNav').innerHTML = html;

      // 更新跳转输入框
      document.getElementById('jumpPageInput').value = p.page;
      document.getElementById('jumpPageInput').max = p.totalPages;
      document.getElementById('pageInfo').textContent = `第 ${p.page} 页，共 ${p.totalPages} 页，共 ${p.total} 条记录`;
    }

    function jumpToPage() {
      const input = document.getElementById('jumpPageInput');
      let page = parseInt(input.value);
      if (isNaN(page) || page < 1) page = 1;
      if (page > totalPages) page = totalPages;
      input.value = page;
      goToPage(page);
    }

    function goToPage(page) {
      if (page < 1) page = 1;
      if (page > totalPages) page = totalPages;
      currentPage = page;
      loadLogs();
      // 滚动到顶部
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

          document.getElementById('notifAdminContent').value = '';
          document.getElementById('notifAdminType').value = 'once';
          document.getElementById('notifAdminStatus').innerHTML = '<span style="color:#888;">● 当前无活跃通知</span>';
        }
      } catch (e) {
        document.getElementById('notifAdminStatus').innerHTML = '<span style="color:#ff3b30;">● 加载失败</span>';
      }
      document.getElementById('notificationModal').style.display = 'flex';
    }

    async function saveNotification() {
      const title = document.getElementById('notifAdminTitle').value.trim();
      const content = document.getElementById('notifAdminContent').value.trim();
      const type = document.getElementById('notifAdminType').value;
      if (!title || !content) { alert('请填写标题和内容'); return; }
      try {
        const res = await fetch('/api/admin/notification', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, content, type, is_active: true })
        });
        if (res.ok) {
          hideModal('notificationModal');
          showAdminToast('通知已发布');
        } else {
          const err = await res.json();
          alert(err.error || '发布失败');
        }
      } catch (e) { alert('网络错误'); }
    }

    async function disableNotification() {
      if (!confirm('确认停用当前通知？')) return;
      try {
        const res = await fetch('/api/admin/notification', {
          method: 'DELETE',
          headers: {}
        });
        if (res.ok) {
          hideModal('notificationModal');
          showAdminToast('通知已停用');
        }
      } catch (e) { alert('网络错误'); }
    }

    function showAdminToast(msg) {
      let t = document.getElementById('adminToast');
      if (!t) {
        t = document.createElement('div');
        t.id = 'adminToast';
        document.body.appendChild(t);
      }
      t.textContent = msg;
      t.style.opacity = '1';
      clearTimeout(t._timer);
      t._timer = setTimeout(() => { t.style.opacity = '0'; }, 2000);
    }

    function formatDate(d) { return new Date(d + 'Z').toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' }); }
    function formatAction(a) { var m = { 'qr_manual': '手动刷新', 'qr_auto': '自动刷新', 'qr_timeout': '生成超时', 'qr_blocked': '已被拉黑', 'page_load': '页面加载', 'admin_verify_attempt': '管理员验证', 'admin_verify_success': '验证成功' }; return m[a] || a; }
    function getActionClass(a) { if (a === 'qr_manual') return 'manual'; if (a === 'qr_auto') return 'auto'; if (a === 'qr_timeout') return 'timeout'; if (a === 'qr_blocked') return 'blocked'; if (a.includes('success')) return 'success'; if (a.includes('verify')) return 'verify'; if (a.includes('load')) return 'load'; return 'refresh'; }
  </script>

  <!-- 通知管理弹窗 -->
  <div class="modal" id="notificationModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;">
    <div class="modal-content" style="max-width:440px;width:calc(100vw - 32px);">
      <h2 style="margin-bottom:4px;">管理员通知</h2>
      <div id="notifAdminStatus" style="font-size:13px;color:#888;margin-bottom:16px;"></div>
      <div class="form-group">
        <label>通知标题</label>
        <input type="text" id="notifAdminTitle" placeholder="通知标题（最多100字符）" maxlength="100">
      </div>
      <div class="form-group">
        <label>通知内容</label>
        <textarea id="notifAdminContent" rows="5" placeholder="通知内容，支持换行（最多1000字符）" maxlength="1000" style="width:100%;padding:10px 12px;border:1px solid #e5e5ea;border-radius:10px;font-size:14px;font-family:inherit;resize:vertical;box-sizing:border-box;"></textarea>
      </div>
      <div class="form-group">
        <label>弹出方式</label>
        <select id="notifAdminType">
          <option value="once">仅首次打开时弹出</option>
          <option value="always">每次打开都弹出</option>
        </select>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" onclick="hideModal('notificationModal')">取消</button>
        <button type="button" class="btn" style="background:#ff3b30;color:white;border-color:#ff3b30;" onclick="disableNotification()">停用</button>
        <button type="button" class="btn" onclick="saveNotification()">发布</button>
      </div>
    </div>
  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>慧湖通管理后台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./admin.css">
</head>
<body>
  <div class="login-container" id="loginPage">
    <div class="login-box">
      <h1>管理后台</h1>
      <form id="loginForm" onsubmit="event.preventDefault(); return false;">
        <div class="form-group">
          <label>用户名</label>
          <input type="text" id="username" required autocomplete="username">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn" style="width:100%">登录</button>
        <div class="error-msg" id="loginError"></div>
      </form>
    </div>
  </div>

  <div class="dashboard" id="dashboard">
    <div class="header">
      <h1>慧湖通管理后台</h1>
      <div class="header-actions">
        <button class="btn-secondary" id="darkModeToggle" onclick="toggleDarkMode()">🌙 深色</button>
        <button class="btn-secondary" onclick="refreshData()">刷新</button>
        <button class="btn-secondary" onclick="showNotificationModal()">通知</button>
        <button class="btn-secondary" onclick="showBlacklistModal()">黑名单</button>
        <button class="btn-secondary" onclick="showClearLogsModal()">清理</button>
        <button class="btn-secondary" onclick="showChangePasswordModal()">密码</button>
        <button class="btn-secondary" onclick="logout()">退出</button>
      </div>
    </div>

    <div class="content">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="value" id="statTotal">-</div>
          <div class="label">总访问</div>
        </div>
        <div class="stat-card" style="cursor:pointer;" onclick="showUsersModal()">
          <div class="value" id="statUnique">-</div>
          <div class="label">用户数 ↗</div>
        </div>
        <div class="stat-card">
          <div class="value" id="statToday">-</div>
          <div class="label">今日</div>
        </div>
        <div class="stat-card" style="cursor:pointer;" onclick="showBlacklistModal()">
          <div class="value danger" id="statBlocked">-</div>
          <div class="label">已拉黑 ↗</div>
        </div>
        <div class="stat-card">
          <div class="value" id="statRetention">-</div>
          <div class="label">保留</div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2>访问记录</h2>
          <div class="filters">
            <input type="text" class="filter-input filter-openid" placeholder="OpenID" id="filterOpenId">
            <input type="text" class="filter-input" placeholder="用户名" id="filterUserName">
            <input type="text" class="filter-input" placeholder="标签" id="filterTag">
            <select class="filter-select" id="filterAction">
              <option value="">全部操作</option>
              <option value="page_load">页面加载</option>
              <option value="qr_manual">手动刷新</option>
              <option value="qr_auto">自动刷新</option>
              <option value="qr_timeout">生成超时</option>
              <option value="qr_blocked">已被拉黑</option>
              <option value="admin_verify">管理员验证</option>
            </select>
            <select class="filter-select" id="filterDevice">
              <option value="">全部设备</option>
              <option value="iphone">iPhone</option>
              <option value="ipad">iPad</option>
              <option value="android">Android</option>
              <option value="mac">Mac</option>
              <option value="windows">Windows</option>
              <option value="wechat">微信</option>
            </select>
            <select class="filter-select" id="filterBlocked">
              <option value="">全部状态</option>
              <option value="blocked">仅已拉黑</option>
              <option value="normal">仅未拉黑</option>
            </select>
            <input type="date" class="filter-input" id="filterStartDate">
            <input type="date" class="filter-input" id="filterEndDate">
            <button class="filter-btn" onclick="applyFilters()">筛选</button>
            <button class="filter-btn reset" onclick="resetFilters()">重置</button>
          </div>
          <div class="filter-shortcuts" id="filterShortcuts">
            <button type="button" class="filter-shortcut" data-range="today">今天</button>
            <button type="button" class="filter-shortcut" data-range="last7">近 7 天</button>
            <button type="button" class="filter-shortcut" data-range="last30">近 30 天</button>
            <button type="button" class="filter-shortcut" data-range="month">本月</button>
          </div>
          <div class="filter-summary" id="filterSummary"></div>
          <div class="log-bulk-actions">
            <div class="log-bulk-meta">
              <span class="log-bulk-status" id="logSelectionStatus">未选中记录</span>
            </div>
            <div class="log-bulk-buttons">
              <button type="button" class="btn-small" id="selectVisibleBtn">全选本页</button>
              <button type="button" class="btn-small" id="clearSelectionBtn" disabled>清空选择</button>
              <button type="button" class="btn-small btn-danger-soft" id="deleteSelectedBtn" disabled>删除选中</button>
              <button type="button" class="btn-small btn-danger-soft" id="deleteFilteredBtn" disabled>删除筛选结果</button>
            </div>
          </div>
          <div class="note">* 设备版本号可能因浏览器隐私保护机制而显示不准确（Chrome 会冻结版本号）</div>
        </div>

        <!-- 桌面端表格 -->
        <div class="table-scroll-shell is-scroll-start is-scroll-end" id="logsTableShell">
          <div class="table-wrapper" id="logsTableWrapper">
            <table>
              <thead>
                <tr>
                  <th class="table-select-col"><input type="checkbox" class="select-all-checkbox" id="selectPageCheckbox" aria-label="全选本页"></th>
                  <th class="table-time-col">时间</th>
                  <th class="table-openid-col">OpenID</th>
                  <th class="table-action-col">操作</th>
                  <th class="table-device-col">设备</th>
                  <th class="table-ip-col">IP</th>
                  <th class="table-actions-col">管理</th>
                </tr>
              </thead>
              <tbody id="logsTable"></tbody>
            </table>
          </div>
        </div>

        <!-- 移动端卡片 -->
        <div class="log-cards" id="logCards"></div>

        <!-- 分页区域 -->
        <div class="pagination-wrapper">
          <div class="pagination-nav" id="paginationNav"></div>
          <div class="pagination-jump">
            <div class="pagination-size">
              <label for="pageSizeSelect">每页</label>
              <select id="pageSizeSelect">
                <option value="10">10 条</option>
                <option value="20" selected>20 条</option>
                <option value="50">50 条</option>
                <option value="100">100 条</option>
              </select>
            </div>
            <div style="display:flex;align-items:center;gap:6px;">
              <label>跳至</label>
              <input type="number" id="jumpPageInput" min="1" value="1">
              <label>页</label>
              <button onclick="jumpToPage()">跳转</button>
            </div>
            <span class="page-info" id="pageInfo">第 1 页，共 1 页，共 0 条记录</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Change Password Modal -->
  <div class="modal" id="changePasswordModal">
    <div class="modal-content">
      <h2>修改密码</h2>
      <form id="changePasswordForm" onsubmit="event.preventDefault(); return false;">
        <div class="form-group">
          <label>当前密码</label>
          <input type="password" id="oldPassword" required>
        </div>
        <div class="form-group">
          <label>新密码</label>
          <input type="password" id="newPassword" required minlength="8">
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-outline" onclick="hideModal('changePasswordModal')">取消</button>
          <button type="submit" class="btn">确认</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Clear Logs Modal -->
  <div class="modal" id="clearLogsModal">
    <div class="modal-content">
      <h2>清理日志</h2>
      <form id="clearLogsForm" onsubmit="event.preventDefault(); return false;">
        <div class="form-group">
          <label>自动清理保留天数</label>
          <select id="retentionDays">
            <option value="7">7 天</option>
            <option value="14">14 天</option>
            <option value="30" selected>30 天</option>
            <option value="60">60 天</option>
            <option value="90">90 天</option>
          </select>
        </div>
        <div class="form-group">
          <label>手动清理</label>
          <select id="clearDays">
            <option value="7">清除 7 天前</option>
            <option value="14">清除 14 天前</option>
            <option value="30">清除 30 天前</option>
            <option value="all">清除全部</option>
          </select>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-outline" onclick="hideModal('clearLogsModal')">取消</button>
          <button type="button" class="btn" onclick="saveRetention()">保存</button>
          <button type="button" class="btn btn-danger" onclick="clearLogs()">清理</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Tag Modal -->
  <div class="modal" id="tagModal">
    <div class="modal-content">
      <h2>设置标签</h2>
      <form id="tagForm" onsubmit="event.preventDefault(); return false;">
        <div class="form-group">
          <label>OpenID</label>
          <input type="text" id="tagOpenId" readonly class="readonly-input">
        </div>
        <div class="form-group">
          <label>备注标签</label>
          <input type="text" id="tagValue" placeholder="输入备注（留空删除）" maxlength="50">
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-outline" onclick="hideModal('tagModal')">取消</button>
          <button type="submit" class="btn">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Block Modal -->
  <div class="modal" id="blockModal">
    <div class="modal-content">
      <h2>拉黑用户</h2>
      <form id="blockForm" onsubmit="event.preventDefault(); return false;">
        <div class="form-group">
          <label>OpenID</label>
          <input type="text" id="blockOpenId" readonly class="readonly-input">
        </div>
        <div class="form-group">
          <label>拉黑原因（显示在按钮下方，可选）</label>
          <textarea id="blockReason" rows="2" placeholder="输入拉黑原因"></textarea>
        </div>
        <div class="form-group">
          <label>按钮文字（可选，留空显示默认）</label>
          <input type="text" id="blockBanMessage" placeholder="此 OpenID 已被禁用" maxlength="100">
        </div>
        <div class="form-group">
          <label>自动解封时间（北京时间，留空为永久封禁）</label>
          <input type="datetime-local" id="blockExpiresAt">
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-outline" onclick="hideModal('blockModal')">取消</button>
          <button type="submit" class="btn btn-danger">确认拉黑</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Users Modal -->
  <div class="modal" id="usersModal">
    <div class="modal-content" style="max-width:560px;">
      <h2>所有用户 (<span id="usersCount">0</span>)</h2>
      <div id="usersList" style="max-height:380px;overflow-y:auto;"></div>
      <div class="modal-actions">
        <button type="button" class="btn" onclick="hideModal('usersModal')">关闭</button>
      </div>
    </div>
  </div>

  <!-- Blacklist Modal -->
  <div class="modal" id="blacklistModal">
    <div class="modal-content">
      <h2>黑名单管理</h2>
      <div id="blacklistContent"></div>
      <div class="modal-actions" style="margin-top:16px;">
        <button type="button" class="btn btn-outline" onclick="hideModal('blacklistModal')" style="width:100%">关闭</button>
      </div>
    </div>
  </div>

  <script defer src="./admin.js"></script>

  <!-- 通知管理弹窗 -->
  <div class="modal" id="notificationModal" style="display:none;position:fixed;inset:0;background:rgba(26,26,26,0.7);z-index:1000;align-items:center;justify-content:center;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);">
    <div class="modal-content" style="max-width:440px;width:calc(100vw - 48px);">
      <h2>管理员通知</h2>
      <div id="notifAdminStatus"></div>
      <div class="form-group">
        <label>通知标题</label>
        <input type="text" id="notifAdminTitle" placeholder="通知标题（最多100字符）" maxlength="100">
      </div>
      <div class="form-group">
        <label>通知内容</label>
        <textarea id="notifAdminContent" rows="5" placeholder="通知内容，支持换行（最多1000字符）" maxlength="1000" style="resize:vertical;"></textarea>
      </div>
      <div class="form-group">
        <label>弹出方式</label>
        <select id="notifAdminType">
          <option value="once">仅首次打开时弹出</option>
          <option value="always">每次打开都弹出</option>
        </select>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" onclick="hideModal('notificationModal')">取消</button>
        <button type="button" class="btn btn-danger" onclick="disableNotification()">停用</button>
        <button type="button" class="btn" onclick="saveNotification()">发布</button>
      </div>
    </div>
  </div>

</body>
</html>
